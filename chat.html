<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Assistant · CBUSEVENTS</title>
  <meta name="description" content="Ask anything about Columbus events, venues, vendors, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #0a0a1a;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 4px 20px rgba(249,115,22,0.4); }
      50% { box-shadow: 0 4px 28px rgba(249,115,22,0.7); }
    }

    .chat-root {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: -webkit-fill-available;
      width: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #0f172a 50%, #1a0a00 100%);
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-1 {
      top: -15%; right: -8%;
      width: clamp(180px, 38vw, 440px);
      height: clamp(180px, 38vw, 440px);
      background: radial-gradient(circle, rgba(249,115,22,0.09) 0%, transparent 70%);
    }
    .glow-orb-2 {
      bottom: -15%; left: -8%;
      width: clamp(220px, 42vw, 540px);
      height: clamp(220px, 42vw, 540px);
      background: radial-gradient(circle, rgba(234,88,12,0.07) 0%, transparent 70%);
    }

    /* HEADER */
    .chat-header {
      padding: clamp(10px, 2.5vw, 18px) clamp(14px, 3.5vw, 28px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 16px);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10,10,26,0.88);
      z-index: 10;
      flex-shrink: 0;
    }
    .header-icon {
      width: clamp(34px, 7.5vw, 46px);
      height: clamp(34px, 7.5vw, 46px);
      border-radius: clamp(8px, 2vw, 13px);
      background: linear-gradient(135deg, #f97316, #ea580c);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(15px, 3.2vw, 21px);
      flex-shrink: 0;
      animation: pulseGlow 3s ease-in-out infinite;
    }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(14px, 3.2vw, 19px);
      color: #fff;
      letter-spacing: -0.4px;
      line-height: 1.2;
    }
    .header-title span { color: #f97316; }
    .header-subtitle {
      font-size: clamp(10px, 1.9vw, 12px);
      color: #64748b;
      margin-top: 2px;
    }
    .status-dot { color: #22c55e; margin-right: 5px; }
    .header-right { margin-left: auto; }
    .clear-btn {
      padding: clamp(5px, 1.3vw, 7px) clamp(9px, 2.2vw, 13px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
      font-size: clamp(10px, 1.9vw, 12px);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    /* MESSAGES */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: clamp(14px, 3.5vw, 26px) clamp(10px, 3vw, 22px);
      scrollbar-width: thin;
      scrollbar-color: rgba(249,115,22,0.22) transparent;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .messages-area::-webkit-scrollbar { width: 3px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.22); border-radius: 4px; }
    .messages-inner { max-width: 720px; margin: 0 auto; width: 100%; }

    .message-row {
      display: flex;
      margin-bottom: clamp(10px, 2.5vw, 18px);
      animation: fadeSlideIn 0.28s ease forwards;
      gap: clamp(6px, 1.8vw, 11px);
      align-items: flex-end;
    }
    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }

    .avatar {
      width: clamp(26px, 5.5vw, 33px);
      height: clamp(26px, 5.5vw, 33px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(11px, 2.5vw, 14px);
      flex-shrink: 0;
    }
    .avatar.assistant {
      background: linear-gradient(135deg, #f97316, #ea580c);
      box-shadow: 0 2px 10px rgba(249,115,22,0.4);
    }
    .avatar.user {
      background: linear-gradient(135deg, #334155, #1e293b);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .bubble {
      max-width: min(74%, 540px);
      padding: clamp(9px, 2.2vw, 13px) clamp(11px, 2.8vw, 17px);
      font-size: clamp(13px, 2.4vw, 14.5px);
      line-height: 1.65;
      color: #f1f5f9;
      white-space: pre-wrap;
      word-break: break-word;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .bubble.assistant {
      border-radius: 17px 17px 17px 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
    }
    .bubble.user {
      border-radius: 17px 17px 4px 17px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid rgba(249,115,22,0.28);
      box-shadow: 0 4px 18px rgba(249,115,22,0.1);
    }

    /* TYPING */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: clamp(6px, 1.8vw, 11px);
      margin-bottom: clamp(10px, 2.5vw, 18px);
      animation: fadeSlideIn 0.28s ease forwards;
    }
    .typing-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 17px 17px 17px 4px;
      padding: clamp(10px, 2.5vw, 14px) clamp(13px, 3vw, 17px);
      display: flex; gap: 5px; align-items: center;
      backdrop-filter: blur(10px);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f97316;
      display: inline-block;
    }

    /* ERROR */
    .error-msg {
      text-align: center;
      color: #ef4444;
      font-size: clamp(12px, 2.3vw, 13px);
      margin-bottom: 12px;
      padding: 8px 16px;
      background: rgba(239,68,68,0.08);
      border-radius: 10px;
      border: 1px solid rgba(239,68,68,0.2);
    }

    /* SUGGESTIONS */
    .suggestions-wrap {
      padding: 0 clamp(10px, 3vw, 22px) clamp(6px, 1.8vw, 12px);
      flex-shrink: 0;
    }
    .suggestions-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: clamp(5px, 1.4vw, 9px);
    }
    .suggestion-chip {
      padding: clamp(5px, 1.4vw, 7px) clamp(10px, 2.3vw, 14px);
      border-radius: 20px;
      border: 1px solid rgba(249,115,22,0.3);
      background: rgba(249,115,22,0.08);
      color: #fb923c;
      font-size: clamp(11px, 2vw, 12.5px);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .suggestion-chip:hover {
      background: rgba(249,115,22,0.18);
      border-color: rgba(249,115,22,0.5);
      transform: translateY(-1px);
    }

    /* INPUT */
    .input-area {
      padding: clamp(10px, 2.5vw, 16px) clamp(10px, 3vw, 22px) clamp(12px, 3.5vw, 22px);
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(10,10,26,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
      z-index: 10;
    }
    .input-inner { max-width: 720px; margin: 0 auto; }
    .input-box {
      display: flex;
      gap: clamp(7px, 1.8vw, 11px);
      align-items: flex-end;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: clamp(12px, 3vw, 17px);
      padding: clamp(7px, 1.8vw, 10px) clamp(7px, 1.8vw, 10px) clamp(7px, 1.8vw, 10px) clamp(13px, 3vw, 17px);
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: rgba(249,115,22,0.38); }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #f1f5f9;
      font-size: clamp(13px, 2.4vw, 15px);
      resize: none;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      max-height: 110px;
      overflow-y: auto;
      padding-top: 3px;
      scrollbar-width: none;
      caret-color: #f97316;
    }
    #chat-input::-webkit-scrollbar { display: none; }
    #chat-input::placeholder { color: #3d4f63; }

    .send-btn {
      width: clamp(32px, 7.5vw, 40px);
      height: clamp(32px, 7.5vw, 40px);
      border-radius: clamp(8px, 2vw, 11px);
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 2.8vw, 17px);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      background: rgba(255,255,255,0.07);
      color: #475569;
    }
    .send-btn.active {
      background: linear-gradient(135deg, #f97316, #ea580c);
      box-shadow: 0 4px 15px rgba(249,115,22,0.45);
      color: #fff;
      cursor: pointer;
    }
    .send-btn.active:hover { transform: scale(1.06); }
    .send-btn.active:active { transform: scale(0.97); }

    .input-hint {
      text-align: center;
      font-size: clamp(10px, 1.8vw, 11px);
      color: #2d3a4a;
      margin-top: clamp(5px, 1.3vw, 8px);
    }

    @media (max-width: 420px) {
      .input-hint { display: none; }
      .avatar { display: none; }
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="chat-root">
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Header -->
    <div class="chat-header">
      <div class="header-icon">⚡</div>
      <div>
        <div class="header-title">CBUS<span>EVENTS</span></div>
        <div class="header-subtitle"><span class="status-dot">●</span>AI Assistant · Columbus, OH</div>
      </div>
      <div class="header-right">
        <button class="clear-btn" onclick="clearChat()">Clear chat</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messages-area">
      <div class="messages-inner" id="messages-inner"></div>
    </div>

    <!-- Suggestions -->
    <div class="suggestions-wrap" id="suggestions-wrap">
      <div class="suggestions-inner" id="suggestions-inner"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-inner">
        <div class="input-box">
          <textarea
            id="chat-input"
            placeholder="Ask about Columbus events, venues, vendors..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
        </div>
        <div class="input-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>

  <script>
    const SYSTEM_PROMPT = `You are an AI assistant for CBUSEVENTS, a Columbus, Ohio event platform connecting venues, vendors, planners, and attendees. You help users discover events, find venues, connect with vendors, and plan events in Columbus. Be friendly, knowledgeable about Columbus, and concise. If asked about specific real-time data (live event listings, etc.), let the user know to browse the platform directly at cbusevents.com.`;

    const SUGGESTIONS = [
      "What venues are on CBUSEVENTS?",
      "How do I list my business?",
      "Upcoming events in Columbus?",
      "How do I find a vendor?",
    ];

    let messages = [];
    let loading = false;

    const messagesInner = document.getElementById('messages-inner');
    const messagesArea = document.getElementById('messages-area');
    const suggestionsWrap = document.getElementById('suggestions-wrap');
    const suggestionsInner = document.getElementById('suggestions-inner');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    // Build suggestion chips
    SUGGESTIONS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-chip';
      btn.textContent = s;
      btn.onclick = () => { chatInput.value = s; autoResize(); updateSendBtn(); chatInput.focus(); };
      suggestionsInner.appendChild(btn);
    });

    // Init with greeting
    addMessage('assistant', "Hey! I'm your CBUSEVENTS assistant 🍊 Ask me anything about Columbus events, venues, vendors, or how to get started on the platform!");

    function addMessage(role, content) {
      messages.push({ role, content });

      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      if (role === 'assistant') {
        const av = document.createElement('div');
        av.className = 'avatar assistant';
        av.textContent = '⚡';
        row.appendChild(av);
      }

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.textContent = content;
      row.appendChild(bubble);

      if (role === 'user') {
        const av = document.createElement('div');
        av.className = 'avatar user';
        av.textContent = '👤';
        row.appendChild(av);
      }

      messagesInner.appendChild(row);
      scrollToBottom();

      // Hide suggestions once user sends something
      if (role === 'user') {
        suggestionsWrap.style.display = 'none';
      }
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing-indicator';

      const av = document.createElement('div');
      av.className = 'avatar assistant';
      av.textContent = '⚡';
      row.appendChild(av);

      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      [0, 1, 2].forEach(i => {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.animation = `bounce 1.2s ease-in-out ${i * 0.2}s infinite`;
        bubble.appendChild(dot);
      });
      row.appendChild(bubble);

      messagesInner.appendChild(row);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function showError(msg) {
      const el = document.createElement('div');
      el.className = 'error-msg';
      el.id = 'error-msg';
      el.textContent = msg;
      messagesInner.appendChild(el);
      scrollToBottom();
    }

    function hideError() {
      const el = document.getElementById('error-msg');
      if (el) el.remove();
    }

    function scrollToBottom() {
      messagesArea.scrollTo({ top: messagesArea.scrollHeight, behavior: 'smooth' });
    }

    function autoResize() {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 110) + 'px';
    }

    function updateSendBtn() {
      if (chatInput.value.trim() && !loading) {
        sendBtn.classList.add('active');
        sendBtn.disabled = false;
      } else {
        sendBtn.classList.remove('active');
        sendBtn.disabled = true;
      }
    }

    chatInput.addEventListener('input', () => { autoResize(); updateSendBtn(); });
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || loading) return;

      loading = true;
      chatInput.value = '';
      autoResize();
      updateSendBtn();
      hideError();

      addMessage('user', text);
      showTyping();

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: messages.map(m => ({ role: m.role, content: m.content })),
          }),
        });

        const data = await response.json();
        const reply = data?.content?.[0]?.text || "Sorry, I couldn't get a response.";
        hideTyping();
        addMessage('assistant', reply);
      } catch (err) {
        hideTyping();
        showError('Connection error. Please try again.');
      } finally {
        loading = false;
        updateSendBtn();
        chatInput.focus();
      }
    }

    function clearChat() {
      messages = [];
      messagesInner.innerHTML = '';
      suggestionsWrap.style.display = '';
      hideError();
      addMessage('assistant', "Hey! I'm your CBUSEVENTS assistant 🍊 Ask me anything about Columbus events, venues, vendors, or how to get started on the platform!");
    }

    updateSendBtn();
  </script>
</body>
</html>
