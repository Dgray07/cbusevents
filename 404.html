<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<script>
// Grab the path and redirect to index with it as a query param
const path = window.location.pathname;
const search = window.location.search;
window.location.replace('https://cbusevents.com/?r=' + encodeURIComponent(path + search));
</script>
</head>
<body></body>
</html>
